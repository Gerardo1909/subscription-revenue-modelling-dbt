version: 2

models:
    - name: int_date_spine
      description: >
          Monthly date spine from the earliest subscription start_date to the latest
          subscription end_date in stg_subscriptions. One row per month (first day of
          month). The range is computed dynamically from the data using run_query so
          the spine extends automatically as new subscriptions are loaded.

          Used by int_subscription_months to drive the fan-out join.
      columns:
          - name: date_month
            description: First day of each calendar month in the subscription data range.
            tests:
                - not_null
                - unique

    - name: int_subscription_months
      description: >
          Fan-out model: one row per subscription × active month.

          A subscription is active in a month when it is live on the LAST DAY of
          that month: start_date <= last_day(month) AND
          end_date >= last_day(month). This handles mid-month start/end dates
          correctly — a subscription expiring on the 8th is still active in that
          month's last-day evaluation.

          Source: stg_subscriptions joined with int_date_spine.
      tests:
          - dbt_utils.unique_combination_of_columns:
                arguments:
                    combination_of_columns:
                        - subscription_id
                        - date_month
      columns:
          - name: account_id
            description: Numeric identifier for the customer account.
            tests:
                - not_null

          - name: subscription_id
            description: Unique identifier for the subscription period.
            tests:
                - not_null

          - name: date_month
            description: First day of the calendar month in which this subscription is active.
            tests:
                - not_null

          - name: product_line
            description: Product family associated with the subscription.
            tests:
                - not_null

          - name: arr_usd
            description: Annual Recurring Revenue in USD for this subscription in this month.
            tests:
                - not_null

    - name: int_account_monthly_arr
      description: >
          Account-level ARR aggregated to monthly granularity with gap-filled
          account-month continuity and LAG-based previous_month_arr. One row per
          (account_id, date_month).

          Pipeline (see inline SQL comments for detail):
            1. Aggregate ARR across all active subscriptions per account × month.
            2. Compute first_active_month / last_active_month per account.
            3. Build a continuous account × month series between those bounds
               using int_date_spine.
            4. Left join real ARR months to that series and fill missing months
               with arr = 0.0, making interim inactivity explicit.
            5. Run LAG for previous_month_arr over the full gap-filled timeline
               so month-over-month transitions are computed consistently.

          This allows correct classification of interim churn/reactivation
          scenarios (for example, active → zero → active across consecutive months).
          Consumed by fct_monthly_arr, which only adds classification logic.
      tests:
          - dbt_utils.unique_combination_of_columns:
                arguments:
                    combination_of_columns:
                        - account_id
                        - date_month
      columns:
          - name: account_id
            description: Numeric identifier for the customer account.
            tests:
                - not_null

          - name: date_month
            description: >
                First day of the calendar month in the continuous per-account
                series from first_active_month to last_active_month (inclusive).
                Includes both real ARR months and gap-filled zero-ARR months.
            tests:
                - not_null

          - name: monthly_arr
            description: >
                Total Annual Recurring Revenue in USD across all active subscriptions
                for this account in this month. Gap months with no active subscription
                are explicitly represented as 0.0.
            tests:
                - not_null

          - name: first_active_month
            description: >
                First calendar month the account ever had at least one active
                subscription. Used by fct_monthly_arr to distinguish 'new' (first
                month ever) from 'reactivation' (arr > 0 after a gap).
            tests:
                - not_null

          - name: previous_month_arr
            description: >
                Total ARR for the immediately preceding month in the gap-filled
                per-account timeline. 0.0 for the first month the account appears.
            tests:
                - not_null
