version: 2

models:
    - name: fct_monthly_arr
      description: >
          Monthly ARR fact table. One row per (account_id, date_month), covering every
          month the account had at least one active subscription plus one synthetic churn
          row appended for the month immediately following the last active month.

          Classifies each month's ARR movement into a change_category so consumers can
          track subscription health over time without additional window functions.

          Source: int_account_monthly_arr (account-level aggregation with pre-computed
          previous_month_arr via LAG).
      tests:
          - dbt_utils.unique_combination_of_columns:
                arguments:
                    combination_of_columns:
                        - account_id
                        - date_month
      columns:
          - name: account_id
            description: Numeric identifier for the customer account.
            tests:
                - not_null

          - name: date_month
            description: >
                First day of the calendar month. Includes real months where at least one
                subscription was active, plus one synthetic churn month per account.
            tests:
                - not_null

          - name: monthly_arr
            description: >
                Total Annual Recurring Revenue in USD for all active subscriptions in this
                month. 0.0 for the synthetic churn row.
            tests:
                - not_null
                - dbt_utils.expression_is_true:
                      arguments:
                          expression: ">= 0"

          - name: previous_month_arr
            description: >
                Total ARR for the immediately preceding month in the data. 0 for the first
                month the account appears. For the synthetic churn row this equals the
                last real active month's ARR.
            tests:
                - not_null

          - name: arr_change
            description: >
                Month-over-month ARR delta (monthly_arr - previous_month_arr). Negative
                for churn and downgrade events, positive for new/upgrade/reactivation.
            tests:
                - not_null

          - name: is_active
            description: >
                True if the account has ARR > 0 in the month. False for the synthetic
                churn row and any month where all active subscriptions are free (arr = 0).
            tests:
                - not_null

          - name: change_category
            description: >
                Business classification of the ARR movement compared to the previous month:
                  new          — first month the account ever had ARR
                  upgrade      — ARR increased from a non-zero base
                  downgrade    — ARR decreased but remains above zero
                  churn        — ARR dropped to 0 (includes synthetic churn rows)
                  reactivation — ARR > 0 after one or more months of absence
                  no_change    — ARR unchanged month-over-month
            tests:
                - not_null
                - accepted_values:
                      arguments:
                          values:
                              - 'new'
                              - 'upgrade'
                              - 'downgrade'
                              - 'churn'
                              - 'reactivation'
                              - 'no_change'
